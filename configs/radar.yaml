scan:
  quote: USDT
  inst_type: SWAP
  binance_limit: 40
  okx_limit: 40

accumulation:
  min_sideways_days: 45
  max_range_pct: 80
  max_avg_vol_usd: 20000000
  max_abs_slope_pct: 12

oi:
  min_delta_pct_1h: 3
  min_oi_usd: 2000000

funding:
  negative_threshold_pct: -0.005
  extreme_negative_threshold_pct: -0.05

alerts:
  min_score: 60
  top_n: 5

smart_money:
  enabled: true
  # 免费/订阅额度保护：低频、低 limit；被限流时当前进程会进入冷却并降级到下一个 provider。
  limit: 30
  min_score: 60
  min_smart_wallets: 2
  max_exit_rate_pct: 50
  max_gain_pct_for_fresh_signal: 80
  provider_order:
    - binance_web3
    - gmgn
  allowed_chains:
    - sol
    - bsc
    - base
    - eth
  timeout_seconds: 20
  max_audits_per_scan: 5

resonance:
  min_score: 75

gmgn:
  enabled: true
  cli_path: "gmgn-cli"
  smartmoney_limit: 30
  timeout_seconds: 20

storage:
  # 运行环境可改为 postgres，并在 .env 设置 DATABASE_URL；缺失时自动回落到 --db SQLite。
  backend: sqlite
  postgres:
    url_env: DATABASE_URL
    psql_path: psql
  sqlite:
    path: data/radar.db

telegram:
  # 优先读取环境变量，避免把 token 写入仓库：
  # TELEGRAM_BOT_TOKEN, TELEGRAM_CHAT_ID, TELEGRAM_BOT_USERNAME, TELEGRAM_REQUIRE_MENTION
  bot_token: ""
  chat_id: ""
  bot_username: "ctb007_bot"
  require_mention: true
  interval_minutes: 60


tracking:
  enabled: true
  windows_minutes: "15,60,240,1440"
  enqueue_since_hours: 48
  enqueue_limit: 500
  max_signals_per_run: 50
  max_price_requests_per_run: 80
  max_requests_per_provider_per_run: 50
  success_threshold_pct: 2.0
  outlier_return_pct: 80.0
  min_samples: 5
  max_provider_cooldown_seconds: 3600
  max_tracking_age_hours: 72
  retention_days: 180
  provider_interval: "15m"
  provider_cooldown_minutes: 15
